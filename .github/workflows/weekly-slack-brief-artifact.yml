name: Weekly Slack Brief Artifact

on:
  schedule:
    - cron: "0 13 * * 1"
  workflow_dispatch:

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate weekly Slack brief artifact
        run: bunx tsx scripts/generateWeeklySlackBrief.ts --out artifacts/weekly-slack-brief.txt

      - name: Upload weekly Slack brief artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-slack-brief
          path: artifacts/weekly-slack-brief.txt
