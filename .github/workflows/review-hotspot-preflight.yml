name: Review Hotspot Preflight

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches-ignore:
      - main

jobs:
  preflight:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run review-hotspot preflight
        env:
          REVIEW_HOTSPOT_BASE: ${{ github.event.pull_request.base.sha || (github.event.created && '' || github.event.before) }}
          REVIEW_HOTSPOT_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bun run review:hotspot-preflight
