name: Upgrade Guardrails

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: upgrade-guardrails-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-upgrade-safety:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build for Cloudflare Pages target
        run: bun run build:pages
