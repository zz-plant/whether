name: Prod Synthetic Smoke

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run prod synthetic smoke
        run: node scripts/prod-synthetic-smoke.mjs https://whether.work
